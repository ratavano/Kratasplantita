<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kratasplantita</title>
    <style>
        :root {
            --fondo: #FDFBF6;
            --texto: #4A5D4E;
            --primario: #FF9AA2; /* Color de la barra */
        }

        body {
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--fondo);
            color: var(--texto);
            margin: 0;
            padding: 20px;
        }

        /* --- ESTILO DE LAS BARRITAS --- */
        .contenedor-barra {
            width: 200px;
            height: 12px;
            background-color: #E0E0E0;
            border-radius: 10px;
            margin: 5px auto 15px;
            overflow: hidden;
            border: 1px solid #D1D1D1;
        }

        .progreso {
            height: 100%;
            background-color: var(--primario);
            width: 100%; /* Esto cambiará con JS */
            transition: width 0.5s ease-in-out;
        }

        /* --- ALINEACIÓN DE HERRAMIENTAS --- */
        .contenedor-herramientas {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px; /* Espacio entre ellas */
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .herramienta {
            width: 70px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .herramienta:hover {
            transform: scale(1.1);
        }

        #imagen-arbol {
            width: 280px;
            margin: 20px auto;
            display: block;
        }

        .stats-container {
            font-weight: bold;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="stats-container">Estado: <span id="estado-texto">¡Feliz! ✨</span></div>
    <div class="contenedor-barra">
        <div id="barra-felicidad" class="progreso"></div>
    </div>

    <img id="imagen-arbol" src="arbol_feliz.png" alt="Tu plantita">

    <h2 id="mensaje-peticion">El árbol descansa...</h2>
    <p id="sub-mensaje">¡Pronto pedirá algo!</p>

    <div class="contenedor-herramientas">
        <img src="herramienta_agua.png" class="herramienta" onclick="atender('sed')">
        <img src="herramienta_tijeras.png" class="herramienta" onclick="atender('crecido')">
        <img src="herramienta_fertilizante.png" class="herramienta" onclick="atender('hambre')">
    </div>

    <script>
        let felicidad = 100;
        let necesidadActual = "ninguna";

        // 1. FUNCIÓN PARA CARGAR
        function cargar() {
            const guardado = localStorage.getItem('progresoPlantita');
            if (guardado) {
                felicidad = parseInt(guardado);
            }
            actualizarUI();
            iniciarCiclo();
        }

        // 2. LÓGICA DE NECESIDADES (El juego te pedirá cosas)
        function iniciarCiclo() {
            setInterval(() => {
                if (necesidadActual === "ninguna") {
                    const azar = Math.random();
                    if (azar < 0.3) pedirAlgo();
                } else {
                    // Si tiene una necesidad y no la atiendes, baja la felicidad
                    felicidad = Math.max(0, felicidad - 5);
                    actualizarUI();
                }
            }, 5000); // Revisa cada 5 segundos
        }

        function pedirAlgo() {
            const necesidades = ["sed", "crecido", "hambre"];
            necesidadActual = necesidades[Math.floor(Math.random() * necesidades.length)];
            
            if (necesidadActual === "sed") {
                document.getElementById('mensaje-peticion').innerText = "¡Tengo mucha sed! 💧";
            } else if (necesidadActual === "crecido") {
                document.getElementById('mensaje-peticion').innerText = "¡Mis ramas pesan! ✂️";
            } else if (necesidadActual === "hambre") {
                document.getElementById('mensaje-peticion').innerText = "¡Necesito vitaminas! 🧪";
            }
            document.getElementById('sub-mensaje').innerText = "¡Usa una herramienta!";
        }

        function atender(tipo) {
            if (tipo === necesidadActual) {
                felicidad = Math.min(100, felicidad + 20);
                necesidadActual = "ninguna";
                document.getElementById('mensaje-peticion').innerText = "¡Gracias! 😊";
                document.getElementById('sub-mensaje').innerText = "El árbol descansa...";
                actualizarUI();
                localStorage.setItem('progresoPlantita', felicidad);
            }
        }

        function actualizarUI() {
            // Actualiza la barra con color
            document.getElementById('barra-felicidad').style.width = felicidad + "%";
            
            // Cambia el texto del estado
            const estado = document.getElementById('estado-texto');
            const img = document.getElementById('imagen-arbol');

            if (felicidad > 70) {
                estado.innerText = "¡Muy Feliz! ✨";
                img.src = "arbol_feliz.png";
            } else if (felicidad > 30) {
                estado.innerText = "Está bien 🌿";
                img.src = "arbol_feliz.png";
            } else {
                estado.innerText = "Está triste u.u ☁️";
                img.src = "arbol_triste.png";
            }
        }

        window.onload = cargar;
    </script>
</body>
</html>
